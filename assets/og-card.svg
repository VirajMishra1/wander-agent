<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1c"/>
      <stop offset="0.55" stop-color="#0d1a2e"/>
      <stop offset="1" stop-color="#11243d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#1d4ed8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#1d4ed8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <ellipse cx="1050" cy="160" rx="420" ry="300" fill="url(#glow)"/>

  <!-- flight path, kept in the upper-right, away from text -->
  <path d="M860 96 Q 1060 120 1180 280" fill="none" stroke="#26456b" stroke-width="3" stroke-dasharray="2 12" stroke-linecap="round"/>
  <circle cx="860" cy="96" r="6" fill="#38bdf8"/>
  <circle cx="1180" cy="280" r="6" fill="#818cf8"/>

  <!-- brand -->
  <text x="80" y="118" font-size="34" font-weight="600" fill="#7dd3fc">🌍  Wander Agent</text>

  <!-- headline -->
  <text x="78" y="248" font-size="82" font-weight="800" fill="#f8fafc" letter-spacing="-1">Your AI's personal</text>
  <text x="78" y="344" font-size="82" font-weight="800" fill="url(#accent)" letter-spacing="-1">travel agent.</text>

  <!-- subline -->
  <text x="80" y="432" font-size="34" fill="#9fb3c8">66 tools  ·  zero API keys  ·  flights the airlines hide</text>

  <!-- install pill -->
  <rect x="80" y="486" width="430" height="74" rx="16" fill="#0b1424" stroke="#1e3350" stroke-width="2"/>
  <text x="112" y="532" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="30" fill="#7dd3fc">pip install wander-agent</text>

  <!-- footer -->
  <text x="1200" y="600" text-anchor="end" font-size="26" fill="#5b6b7d">github.com/VirajMishra1/wander-agent</text>
</svg>
