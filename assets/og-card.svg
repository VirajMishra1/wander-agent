<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#10233a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- subtle flight-path arc -->
  <path d="M120 470 Q 640 120 1160 360" fill="none" stroke="#1e3a5f" stroke-width="3" stroke-dasharray="2 14" stroke-linecap="round"/>
  <circle cx="120" cy="470" r="7" fill="#38bdf8"/>
  <circle cx="1160" cy="360" r="7" fill="#818cf8"/>

  <text x="96" y="150" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="44" fill="#7dd3fc">🌍  Wander Agent</text>

  <text x="96" y="280" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="78" font-weight="800" fill="#f8fafc">Your AI's personal</text>
  <text x="96" y="372" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="78" font-weight="800" fill="url(#accent)">travel agent.</text>

  <text x="96" y="456" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="38" fill="#cbd5e1">66 tools · zero API keys · flights the airlines hide</text>

  <rect x="96" y="512" width="360" height="68" rx="14" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <text x="124" y="556" font-family="Menlo, Consolas, monospace" font-size="30" fill="#7dd3fc">pip install wander-agent</text>

  <text x="980" y="556" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="28" fill="#64748b">github.com/VirajMishra1</text>
</svg>
